<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f3f4f6" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Aura glow rings -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
  
  <!-- Central pulse point -->
  <circle cx="100" cy="100" r="45" fill="#3b82f6" opacity="0.8"/>
  <circle cx="100" cy="100" r="35" fill="#8b5cf6" opacity="0.9"/>
  
  <!-- Smaller accent circles for "aura" effect -->
  <circle cx="70" cy="80" r="12" fill="#ec4899" opacity="0.7"/>
  <circle cx="130" cy="75" r="12" fill="#f59e0b" opacity="0.7"/>
  <circle cx="85" cy="130" r="12" fill="#10b981" opacity="0.7"/>
  <circle cx="125" cy="125" r="12" fill="#06b6d4" opacity="0.7"/>
  
  <!-- Center icon - heart beat symbol -->
  <text x="100" y="110" font-size="50" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">
    ⚡
  </text>
</svg>
